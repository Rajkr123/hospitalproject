<!DOCTYPE html>
<html>
<head>
    <title>Payment</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>

<body>

<button onclick="payNow()">Pay ₹647</button>

<script>
    async function payNow() {

        const appointmentId = localStorage.getItem("lastBookedAppointmentId");

        // ✅ Step 1: Get key
        const configRes = await fetch("http://localhost:8083/api/payment/config");
        const config = await configRes.json();

        // ✅ Step 2: Create order
        const orderRes = await fetch("http://localhost:8083/api/payment/create-order?amount=647", {
            method: "POST"
        });

        const order = await orderRes.json();

        var options = {
            "key": config.key,
            "amount": order.amount,
            "currency": "INR",
            "name": "Smart Health",
            "description": "Appointment Payment",
            "order_id": order.id,

            // ✅ SUCCESS
            "handler": async function (response) {

                await fetch("http://localhost:8083/api/payment/verify", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        ...response,
                        appointmentId: appointmentId
                    })
                });

                alert("✅ Payment Success");
                window.location.href = "success.html";
            },

            // ❌ FAILURE
            "modal": {
                "ondismiss": function () {
                    alert("❌ Payment Cancelled");
                }
            },

            "prefill": {
                "name": "Raj Kumar",
                "email": "raj@gmail.com",
                "contact": "9999999999"
            },

            "theme": {
                "color": "#3399cc"
            }
        };

        var rzp = new Razorpay(options);

        rzp.on("payment.failed", function (response) {
            alert("❌ Payment Failed");
            console.log(response.error);
        });

        rzp.open();
    }
</script>

</body>
</html>
