<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointment Calendar | SmartHealth</title>
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="calendar-shell">
    <div class="calendar-grid">
        <div class="calendar-card">
            <div class="eyebrow" style="background:rgba(19,148,235,0.08);color:#0a78c6;"><i class="fas fa-calendar-days"></i> Quick calendar booking</div>
            <h1>Pick a date and reserve a visit</h1>
            <p>This streamlined booking page is useful when you want a lighter appointment flow without opening the full patient dashboard.</p>

            <div class="calendar-actions">
                <a href="appointment.html" class="action-btn primary"><i class="fas fa-layer-group"></i> Open full booking form</a>
                <a href="../index.html" class="action-btn approve"><i class="fas fa-arrow-left"></i> Back to home</a>
            </div>
        </div>

        <div class="calendar-card">
            <h2>Appointment Details</h2>
            <p>Select a date, choose a doctor, and confirm a time slot.</p>

            <div class="form-group" style="margin-top:22px;">
                <label for="date">Appointment Date</label>
                <input type="date" id="date">
            </div>

            <div class="form-group">
                <label for="doctor">Doctor</label>
                <select id="doctor">
                    <option>Select Doctor</option>
                    <option>Dr Sharma</option>
                    <option>Dr Gupta</option>
                    <option>Dr Mehta</option>
                </select>
            </div>

            <div class="form-group">
                <label for="time">Preferred Time</label>
                <select id="time">
                    <option>Select Time</option>
                    <option>10:00 AM</option>
                    <option>11:00 AM</option>
                    <option>12:00 PM</option>
                </select>
            </div>

            <button class="btn-primary" onclick="bookAppointment()">
                <i class="fas fa-calendar-check"></i> Book Appointment
            </button>

            <div id="message" class="calendar-note" style="margin-top:18px;display:none;"></div>
        </div>
    </div>
</div>

<script src="../js/calendra.js"></script>
<script>
    const dateInput = document.getElementById('date');
    dateInput.min = new Date().toISOString().split('T')[0];

    const originalBookAppointment = window.bookAppointment;
    window.bookAppointment = function () {
        if (typeof originalBookAppointment === 'function') {
            originalBookAppointment();
        }

        const message = document.getElementById('message');
        message.style.display = 'block';
        if (!message.textContent.trim()) {
            message.textContent = 'Your appointment request has been submitted.';
        }
    };
</script>

</body>
</html>
